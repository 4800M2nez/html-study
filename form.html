<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フォーム練習</title>
</head>
<body>

  <h1>お問い合わせフォーム</h1>

  <form>

    <!-- テキスト入力 -->
    <label for="name">お名前：</label>
    <input type="text" id="name" name="name" placeholder="例：山田太郎">

    <br><br>

    <!-- メールアドレス入力 -->
    <label for="email">メールアドレス：</label>
    <input type="email" id="email" name="email" placeholder="例：taro@example.com">

    <br><br>

    <!-- パスワード入力 -->
    <label for="password">パスワード：</label>
    <input type="password" id="password" name="password">

    <br><br>

    <!-- 送信ボタン -->
    <button type="submit">送信する</button>
<br><br>
<input type="text">　　← 普通のテキストボックス
<br><br>
<input type="number">　← 数字専用ボックス
<br><br>
<input type="date">　　← 日付選択ボックス
<br><br>
<input type="color">　　← 色選択ボックス
<br><br>
<input type="checkbox">　← チェックボックス
<br><br>
<input type="range">　　← スライダー
  </form>

</body>
</html>
